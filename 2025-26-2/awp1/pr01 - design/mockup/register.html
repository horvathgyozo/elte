<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - RecipeHub</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="navbar bg-base-100 shadow-lg">
        <div class="flex-1">
            <a href="index.html" class="btn btn-ghost text-xl">RecipeHub</a>
        </div>
        <div class="flex-none gap-2">
            <a href="categories.html" class="btn btn-ghost">Categories</a>
            <a href="login.html" class="btn btn-ghost">Login</a>
        </div>
    </div>

    <div class="hero min-h-screen bg-base-200">
        <div class="hero-content flex-col lg:flex-row-reverse">
            <div class="text-center lg:text-left">
                <h1 class="text-5xl font-bold">Join RecipeHub!</h1>
                <p class="py-6">Create an account to share your favorite recipes and discover new ones.</p>
            </div>
            <div class="card shrink-0 w-full max-w-sm shadow-2xl bg-base-100">
                <form class="card-body">
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Full Name</span>
                        </label>
                        <input type="text" placeholder="John Doe" class="input input-bordered" required />
                    </div>
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Email</span>
                        </label>
                        <input type="email" placeholder="email@example.com" class="input input-bordered" required />
                    </div>
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Password</span>
                        </label>
                        <input type="password" placeholder="password" class="input input-bordered" required />
                    </div>
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Confirm Password</span>
                        </label>
                        <input type="password" placeholder="password" class="input input-bordered" required />
                    </div>
                    <div class="form-control">
                        <label class="label cursor-pointer justify-start gap-2">
                            <input type="checkbox" class="checkbox" required />
                            <span class="label-text">I agree to the Terms and Conditions</span>
                        </label>
                    </div>
                    <div class="form-control mt-6">
                        <a href="user-index.html" class="btn btn-primary">Sign Up</a>
                    </div>
                    <div class="divider">OR</div>
                    <p class="text-center">Already have an account? <a href="login.html" class="link link-primary">Login</a></p>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer footer-center p-10 bg-base-200 text-base-content">
        <div>
            <p class="font-bold">RecipeHub</p> 
            <p>Sharing delicious recipes since 2024</p>
        </div>
    </footer>
</body>
</html>
