<!DOCTYPE html>
<html lang="en" data-theme="emerald">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecipeBox - Edit Recipe</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen flex flex-col bg-base-200">

  <!-- Navbar (Authenticated) -->
  <nav class="navbar bg-base-100 shadow-md px-4 lg:px-8">
    <div class="navbar-start">
      <a href="dashboard.html" class="btn btn-ghost text-xl font-bold text-primary">RecipeBox</a>
    </div>
    <div class="navbar-center hidden lg:flex">
      <ul class="menu menu-horizontal gap-1">
        <li><a href="dashboard.html">Home</a></li>
        <li><a href="my-recipes.html">My Recipes</a></li>
        <li><a href="favourites.html">Favourites</a></li>
        <li><a href="my-categories.html">My Categories</a></li>
        <li><a href="add-recipe.html">+ Add Recipe</a></li>
      </ul>
    </div>
    <div class="navbar-end">
      <div class="dropdown dropdown-end">
        <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar avatar-placeholder">
          <div class="bg-primary text-white rounded-full w-10"><span class="text-lg">JD</span></div>
        </div>
        <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-[1] w-52 p-2 shadow-lg mt-2">
          <li class="menu-title"><span>John Doe</span></li>
          <li><a href="my-recipes.html">My Recipes</a></li>
          <li><a href="favourites.html">Favourites</a></li>
          <li><a href="my-categories.html">My Categories</a></li>
          <li class="border-t border-base-300 mt-1 pt-1"><a href="index.html" class="text-error">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Edit Recipe Form (Prefilled) -->
  <main class="px-4 lg:px-8 py-8 max-w-3xl mx-auto w-full flex-1">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold">Edit Recipe</h1>
      <button class="btn btn-error btn-outline btn-sm">Delete Recipe</button>
    </div>

    <!-- method="PUT" action="/recipes/{id}" enctype="multipart/form-data" -->
    <form class="space-y-6">

      <!-- Title -->
      <fieldset class="fieldset">
        <label class="fieldset-label" for="title">Title</label>
        <input id="title" type="text" name="title" value="Grilled Chicken Salad" class="input w-full">
      </fieldset>

      <!-- Description -->
      <fieldset class="fieldset">
        <label class="fieldset-label" for="description">Description</label>
        <textarea id="description" name="description" class="textarea h-24">A fresh and healthy salad with grilled chicken breast, mixed baby greens, cherry tomatoes, cucumbers, and a light honey-lemon vinaigrette.</textarea>
      </fieldset>

      <!-- Image -->
      <fieldset class="fieldset">
        <label class="fieldset-label">Image</label>
        <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&h=250&fit=crop" alt="Current recipe image" class="rounded-lg w-full max-w-xs h-40 object-cover mb-2">
        <input type="file" name="image" class="file-input file-input-sm w-full max-w-xs">
      </fieldset>

      <!-- Categories (Prefilled) -->
      <fieldset class="fieldset">
        <label class="fieldset-label">Categories</label>
        <div class="flex flex-wrap gap-3">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="categories[]" value="breakfast" class="checkbox checkbox-sm checkbox-primary">
            <span class="text-sm">Breakfast</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="categories[]" value="lunch" class="checkbox checkbox-sm checkbox-primary" checked>
            <span class="text-sm">Lunch</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="categories[]" value="dinner" class="checkbox checkbox-sm checkbox-primary">
            <span class="text-sm">Dinner</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="categories[]" value="dessert" class="checkbox checkbox-sm checkbox-primary">
            <span class="text-sm">Dessert</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="categories[]" value="vegan" class="checkbox checkbox-sm checkbox-primary">
            <span class="text-sm">Vegan</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="categories[]" value="quick-meals" class="checkbox checkbox-sm checkbox-primary">
            <span class="text-sm">Quick Meals</span>
          </label>
        </div>
      </fieldset>

      <!-- Difficulty & Cooking Time (Prefilled) -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <fieldset class="fieldset">
          <label class="fieldset-label" for="difficulty">Difficulty</label>
          <select id="difficulty" name="difficulty" class="select w-full">
            <option value="easy" selected>Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </fieldset>
        <fieldset class="fieldset">
          <label class="fieldset-label" for="cooking_time">Cooking Time (minutes)</label>
          <input id="cooking_time" type="number" name="cooking_time" value="30" class="input w-full" min="1">
        </fieldset>
      </div>

      <!-- Ingredients (textarea, prefilled) -->
      <fieldset class="fieldset">
        <label class="fieldset-label" for="ingredients">Ingredients</label>
        <textarea id="ingredients" name="ingredients" class="textarea h-32">2 chicken breasts
4 cups mixed greens
1 cup cherry tomatoes
1 cucumber, sliced
2 tbsp olive oil
1 tbsp lemon juice
1 tbsp honey</textarea>
      </fieldset>

      <!-- Instructions (textarea, prefilled) -->
      <fieldset class="fieldset">
        <label class="fieldset-label" for="instructions">Instructions</label>
        <textarea id="instructions" name="instructions" class="textarea h-40">1. Season chicken breasts with salt, pepper, and olive oil. Let rest for 10 minutes.
2. Preheat grill to medium-high heat. Grill chicken for 6-7 minutes per side.
3. Whisk together olive oil, lemon juice, honey, salt, and pepper for the vinaigrette.
4. Assemble the salad and slice chicken on top. Drizzle with vinaigrette and serve.</textarea>
      </fieldset>

      <!-- Actions -->
      <div class="flex justify-end gap-3">
        <a href="my-recipes.html" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </main>

  <!-- Footer -->
  <footer class="footer footer-center bg-base-100 text-base-content p-6 mt-8 border-t border-base-300">
    <p>Copyright &copy; 2026 RecipeBox. All rights reserved.</p>
  </footer>

</body>
</html>
