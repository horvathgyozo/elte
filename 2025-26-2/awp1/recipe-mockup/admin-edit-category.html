<!DOCTYPE html>
<html lang="en" data-theme="emerald">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecipeBox Admin - Edit Category</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen flex flex-col bg-base-200">

  <!-- Navbar (Admin) -->
  <nav class="navbar bg-base-100 shadow-md px-4 lg:px-8">
    <div class="navbar-start">
      <a href="dashboard.html" class="btn btn-ghost text-xl font-bold text-primary">RecipeBox</a>
      <span class="badge badge-error badge-sm ml-2">ADMIN</span>
    </div>
    <div class="navbar-center hidden lg:flex">
      <ul class="menu menu-horizontal gap-1">
        <li><a href="dashboard.html">Home</a></li>
        <li><a href="admin-users.html">Users</a></li>
        <li><a href="admin-recipes.html">Recipes</a></li>
        <li><a href="admin-categories.html" class="menu-active font-medium">Categories</a></li>
      </ul>
    </div>
    <div class="navbar-end">
      <div class="dropdown dropdown-end">
        <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar avatar-placeholder">
          <div class="bg-error text-white rounded-full w-10"><span class="text-lg">A</span></div>
        </div>
        <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-[1] w-52 p-2 shadow-lg mt-2">
          <li class="menu-title"><span>Admin User</span></li>
          <li><a href="admin-users.html">Users</a></li>
          <li><a href="admin-recipes.html">Recipes</a></li>
          <li><a href="admin-categories.html">Categories</a></li>
          <li class="border-t border-base-300 mt-1 pt-1"><a href="index.html" class="text-error">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Edit Category -->
  <main class="px-4 lg:px-8 py-8 max-w-lg mx-auto w-full flex-1">
    <h1 class="text-2xl font-bold mb-6">Edit Category</h1>

    <div class="card bg-base-100 shadow-md">
      <div class="card-body">
        <!-- method="PUT" action="/admin/categories/{id}" -->
        <form>
          <fieldset class="fieldset mb-4">
            <label class="fieldset-label" for="name">Category Name</label>
            <input id="name" type="text" name="name" value="Breakfast" class="input w-full" required>
          </fieldset>
          <div class="flex justify-end gap-3">
            <a href="admin-categories.html" class="btn btn-ghost">Cancel</a>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer footer-center bg-base-100 text-base-content p-6 border-t border-base-300">
    <p>Copyright &copy; 2026 RecipeBox Admin. All rights reserved.</p>
  </footer>

</body>
</html>
